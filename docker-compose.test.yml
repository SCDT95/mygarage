# MyGarage backend test stack with a PostgreSQL sidecar.
#
# Scope: migration tests (sync engine, asyncpg-free) — the path that
# would have caught migration 054's PG bugs. Run with:
#
#   MYGARAGE_TEST_UID=$(id -u) MYGARAGE_TEST_GID=$(id -g) \
#     docker compose -f docker-compose.test.yml -p mygarage-test \
#       run --rm mygarage-test pytest tests/migrations/ -v
#
# NOT scoped to integration tests (`tests/integration/`) — the async
# session fixture in backend/tests/conftest.py has an asyncpg loop
# binding issue under pytest-asyncio's per-test loop scope. Tracked at:
#   https://github.com/homelabforge/mygarage/issues/77
# Until #77 lands, integration tests still run on SQLite via bin/ci-check.

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mygarage
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: mygarage_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mygarage -d mygarage_test"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks:
      - mygarage-test

  mygarage-test:
    image: mygarage-test:local
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://mygarage:testpass@postgres-test:5432/mygarage_test
      MYGARAGE_TEST_MODE: "true"
      MYGARAGE_SECRET_KEY: test-secret-key
      PYTHONPATH: /app
      UV_PROJECT_ENVIRONMENT: /opt/venv
      HOME: /tmp
      PGHOST: postgres-test
      PGPORT: "5432"
      PGUSER: mygarage
      PGPASSWORD: testpass
      PGDATABASE: mygarage_test
    user: "${MYGARAGE_TEST_UID:-1000}:${MYGARAGE_TEST_GID:-1000}"
    volumes:
      - ./backend:/app
    working_dir: /app
    networks:
      - mygarage-test

networks:
  mygarage-test:
    driver: bridge
