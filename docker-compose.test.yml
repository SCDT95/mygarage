services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mygarage
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: mygarage_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mygarage -d mygarage_test"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks:
      - mygarage-test

  mygarage-test:
    image: mygarage-test:local
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://mygarage:testpass@postgres-test:5432/mygarage_test
      MYGARAGE_TEST_MODE: "true"
      MYGARAGE_SECRET_KEY: test-secret-key
      PYTHONPATH: /app
      UV_PROJECT_ENVIRONMENT: /opt/venv
      HOME: /tmp
      PGHOST: postgres-test
      PGPORT: "5432"
      PGUSER: mygarage
      PGPASSWORD: testpass
      PGDATABASE: mygarage_test
    user: "${MYGARAGE_TEST_UID:-1000}:${MYGARAGE_TEST_GID:-1000}"
    volumes:
      - ./backend:/app
    working_dir: /app
    networks:
      - mygarage-test

networks:
  mygarage-test:
    driver: bridge
